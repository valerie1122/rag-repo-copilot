# Render Blueprint: tells Render how to deploy this app
# Render reads this file automatically when you connect your GitHub repo

services:
  - type: web
    name: rag-repo-copilot
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn src.api.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: OPENAI_API_KEY
        sync: false  # You'll set this manually in Render dashboard
      - key: PYTHON_VERSION
        value: "3.11.0"
    plan: free
    healthCheckPath: /health
